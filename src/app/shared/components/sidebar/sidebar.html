<aside class="sidebar">
  <a class="sidebar-logo" routerLink="/dashboard" data-tour="logo" data-tooltip="Sistema Odonto" aria-label="Sistema Odonto">
    <img src="/assets/logo.png" alt="Sistema Odonto" draggable="false" />
  </a>

  <div class="sidebar-divider"></div>

  <nav class="sidebar-group" aria-label="Navegação principal">
    <a class="sidebar-item" routerLink="/dashboard" routerLinkActive="active" data-tour="dashboard" data-tooltip="Dashboard" aria-label="Dashboard">
      <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1" />
        <rect x="14" y="3" width="7" height="7" rx="1" />
        <rect x="14" y="14" width="7" height="7" rx="1" />
        <rect x="3" y="14" width="7" height="7" rx="1" />
      </svg>
    </a>

    <a class="sidebar-item" routerLink="/consultas" routerLinkActive="active" data-tour="consultas" data-tooltip="Consultas" aria-label="Consultas">
      <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" />
        <line x1="16" y1="2" x2="16" y2="6" />
        <line x1="8" y1="2" x2="8" y2="6" />
        <line x1="3" y1="10" x2="21" y2="10" />
      </svg>
    </a>

    <a class="sidebar-item" routerLink="/relatorios" routerLinkActive="active" data-tour="relatorios" data-tooltip="Relatórios" aria-label="Relatórios">
      <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="20" x2="18" y2="10" />
        <line x1="12" y1="20" x2="12" y2="4" />
        <line x1="6" y1="20" x2="6" y2="14" />
      </svg>
    </a>
  </nav>

  <div class="sidebar-divider"></div>

  <nav class="sidebar-group" aria-label="Cadastros">
    <a class="sidebar-item" routerLink="/pacientes" routerLinkActive="active" data-tour="pacientes" data-tooltip="Pacientes" aria-label="Pacientes">
      <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
        <circle cx="9" cy="7" r="4" />
        <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
        <path d="M16 3.13a4 4 0 0 1 0 7.75" />
      </svg>
    </a>

    <a class="sidebar-item" routerLink="/dentistas" routerLinkActive="active" data-tour="dentistas" data-tooltip="Dentistas" aria-label="Dentistas">
      <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 5.5C19 4 17.7 3 16.3 3c-1.4 0-2.1.8-4.3.8S9.1 3 7.7 3C6.3 3 5 4 5 5.5c0 2 .7 4.3 1.4 6.6.4 1.4.6 4.4 2 4.4 1.2 0 1-2.3 1.5-3.8.3-.9.6-1.4 1.1-1.4s.8.5 1.1 1.4c.5 1.5.3 3.8 1.5 3.8 1.4 0 1.6-3 2-4.4C18.3 9.8 19 7.5 19 5.5z" />
      </svg>
    </a>

    <a class="sidebar-item" routerLink="/especialidades" routerLinkActive="active" data-tour="especialidades" data-tooltip="Especialidades" aria-label="Especialidades">
      <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z" />
        <line x1="7" y1="7" x2="7.01" y2="7" />
      </svg>
    </a>

    <a class="sidebar-item" routerLink="/materiais" routerLinkActive="active" data-tour="materiais" data-tooltip="Materiais" aria-label="Materiais">
      <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z" />
        <path d="M3.3 7 12 12l8.7-5" />
        <path d="M12 22V12" />
      </svg>
    </a>

    @if (authService.temPerfil('ADMIN')) {
      <a class="sidebar-item" routerLink="/admin" routerLinkActive="active" data-tooltip="Administração" aria-label="Administração">
        <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <polyline points="16 11 18 13 22 9" />
        </svg>
      </a>
    }
  </nav>

  <div class="sidebar-spacer"></div>

  <div class="sidebar-divider"></div>

  <nav class="sidebar-group" aria-label="Conta">
    <a class="sidebar-profile" routerLink="/perfil" routerLinkActive="active" [attr.data-tooltip]="(authService.usuario()?.nome || 'Visitante') + ' · ' + (authService.usuario()?.perfil || 'Convidado')" aria-label="Meu perfil">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v1.2c0 .7.5 1.2 1.2 1.2h16.8c.7 0 1.2-.5 1.2-1.2v-1.2c0-3.2-6.4-4.8-9.6-4.8z" />
      </svg>
    </a>

    <button type="button" class="sidebar-item sidebar-item--danger" (click)="logout()" data-tooltip="Sair" aria-label="Sair">
      <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
        <polyline points="16 17 21 12 16 7" />
        <line x1="21" y1="12" x2="9" y2="12" />
      </svg>
    </button>
  </nav>
</aside>
