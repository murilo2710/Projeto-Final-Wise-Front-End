@if (authService.usuario()) {
  <header class="app-header">
    <a class="brand" routerLink="/dashboard">
      <span>Sistema Odonto</span>
      <strong>{{ authService.usuario()?.nome }}</strong>
    </a>

    <nav class="main-nav" aria-label="Navegacao principal">
      <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
      <a routerLink="/consultas" routerLinkActive="active">Consultas</a>
      <a routerLink="/pacientes" routerLinkActive="active">Pacientes</a>
      <a routerLink="/dentistas" routerLinkActive="active">Dentistas</a>
      <a routerLink="/especialidades" routerLinkActive="active">Especialidades</a>
      <a routerLink="/relatorios" routerLinkActive="active">Relatorios</a>
      @if (authService.temPerfil('ADMIN')) {
        <a routerLink="/usuarios" routerLinkActive="active">Usuarios</a>
      }
    </nav>

    <button type="button" class="logout-button" (click)="logout()">Logout</button>
  </header>
}

<router-outlet />
